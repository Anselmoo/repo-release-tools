name: rrt publish-snapshot
description: Force-push a single-commit, no-history snapshot of tracked content to a secondary remote
branding:
  icon: 'upload-cloud'
  color: 'green'

inputs:
  python-version:
    description: Python version used to run repo-release-tools
    default: "3.12"
  working-directory:
    description: Repository path to install and run repo-release-tools from
    default: "."
  target:
    description: >-
      Named [tool.rrt.publish_targets.<name>] entry to resolve
      remote/branch/message/exclude from
    required: true
  confirm:
    description: Set "true" to actually force-push (otherwise a dry-run preview only)
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install repo-release-tools
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: python -m pip install .

    - name: Publish snapshot
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ "${{ inputs.confirm }}" = "true" ]; then
          rrt git publish-snapshot "${{ inputs.target }}" --yes-i-know-this-overwrites-remote-history
        else
          rrt git publish-snapshot "${{ inputs.target }}" --dry-run
        fi

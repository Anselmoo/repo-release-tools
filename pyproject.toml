[project]
name = "repo-release-tools"
version = "0.1.1"
description = "Config-driven branch and release helpers for Git repositories"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Anselm Hahn" }]
requires-python = ">=3.12"
keywords = ["git", "release", "branch", "versioning", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Version Control",
    "Topic :: Utilities",
    "Typing :: Typed",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/Anselmoo/repo-release-tools"
Issues = "https://github.com/Anselmoo/repo-release-tools/issues"
Source = "https://github.com/Anselmoo/repo-release-tools"

[project.scripts]
rrt = "repo_release_tools.cli:main"

[build-system]
requires = ["uv_build>=0.9.26,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.14.0",
    "ty>=0.0.26",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
testpaths = ["tests"]

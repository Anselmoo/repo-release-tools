- id: rrt-branch-name
  name: repo-release-tools branch name
  description: Validate branch names against the repo's conventional branch rules
  entry: rrt-hooks pre-commit
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-changelog
  name: repo-release-tools changelog
  description: Require changelog updates for staged feature and fix commits
  entry: rrt-hooks pre-commit-changelog
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-update-unreleased
  name: repo-release-tools update unreleased changelog
  description: Auto-append conventional commit bullets to the [Unreleased] section
  entry: rrt-hooks update-unreleased
  language: python
  pass_filenames: false
  always_run: true
  stages: [commit-msg]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-commit-subject
  name: repo-release-tools commit subject
  description: Validate commit subjects against Conventional Commits
  entry: rrt-hooks commit-msg
  language: python
  always_run: true
  stages: [commit-msg]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-dirty-tree
  name: repo-release-tools dirty tree
  description: Fail when the repository has uncommitted changes
  entry: rrt-hooks check-dirty-tree
  language: python
  pass_filenames: false
  always_run: true
  stages: [manual, pre-push]
  minimum_pre_commit_version: "3.2.0"

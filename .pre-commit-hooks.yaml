- id: rrt-branch-name
  name: repo-release-tools branch name
  description: Validate branch names against the repo's conventional branch rules
  entry: rrt-hooks pre-commit
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-changelog
  name: repo-release-tools changelog
  description: Require changelog updates for staged feature and fix commits
  entry: rrt-hooks pre-commit-changelog
  language: python
  pass_filenames: false
  always_run: true
  stages: [pre-commit]
  minimum_pre_commit_version: "3.2.0"

- id: rrt-commit-subject
  name: repo-release-tools commit subject
  description: Validate commit subjects against Conventional Commits
  entry: rrt-hooks commit-msg
  language: python
  always_run: true
  stages: [commit-msg]
  minimum_pre_commit_version: "3.2.0"

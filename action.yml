name: repo-release-tools policy checks
description: Validate branch names and commit subjects with repo-release-tools

inputs:
  python-version:
    description: Python version used to run repo-release-tools
    default: "3.12"
  working-directory:
    description: Repository path to install and run repo-release-tools from
    default: "."
  check-branch-name:
    description: Whether to validate the current branch name
    default: "true"
  branch-name:
    description: Explicit branch name to validate; defaults to the workflow branch
    required: false
  check-commit-subject:
    description: Whether to validate the commit subject
    default: "true"
  commit-subject:
    description: Explicit commit subject to validate; defaults to the latest commit subject
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install repo-release-tools
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: python -m pip install .

    - name: Validate branch name
      if: inputs.check-branch-name == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        branch_name="${INPUT_BRANCH_NAME:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
        python -m repo_release_tools.hooks check-branch-name --branch "$branch_name"

    - name: Validate commit subject
      if: inputs.check-commit-subject == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMIT_SUBJECT: ${{ inputs.commit-subject }}
      run: |
        set -euo pipefail
        commit_subject="${INPUT_COMMIT_SUBJECT:-$(git log -1 --pretty=%s)}"
        python -m repo_release_tools.hooks check-commit-subject --subject "$commit_subject"

name: repo-release-tools policy checks
description: Validate branch names, commit subjects, and changelog updates with repo-release-tools
branding:
  icon: 'tag'
  color: 'green'

inputs:
  python-version:
    description: Python version used to run repo-release-tools
    default: "3.12"
  working-directory:
    description: Repository path to install and run repo-release-tools from
    default: "."
  check-branch-name:
    description: Whether to validate the current branch name
    default: "true"
  branch-ref-type:
    description: Explicit ref type override for branch validation; defaults to the workflow ref type
    required: false
  branch-name:
    description: Explicit branch name to validate; defaults to the workflow branch
    required: false
  check-commit-subject:
    description: Whether to validate the commit subject
    default: "true"
  commit-subject:
    description: Explicit commit subject to validate; defaults to the latest commit subject
    required: false
  check-changelog:
    description: Whether to validate changelog updates for changelog-relevant commits
    default: "true"
  changelog-file:
    description: Explicit changelog path to validate
    default: "CHANGELOG.md"
  changelog-strategy:
    description: |
      Changelog enforcement strategy:
        auto         – (default) derive from changelog_workflow in repo config.
        incremental  – alias for per-commit enforcement.
        per-commit   – the changelog file must appear in the commit's changed-file list.
        unreleased   – a non-empty [Unreleased] section must exist in the changelog.
        release-only – the check is skipped (changelog is updated only at release time).
    default: "auto"
  check-dirty-tree:
    description: Whether to fail when the checked-out work tree is dirty
    default: "false"
  check-doctor:
    description: >-
      Whether to run rrt doctor core automation checks.
      For historical release-target validation coverage, this also runs
      rrt release check unless explicitly disabled.
    default: "false"
  check-release-health:
    description: Whether to run rrt release check for version targets, pin targets, and changelog files
    default: "false"
  check-eol:
    description: Whether to check host runtimes and project minimums against end-of-life dates
    default: "false"
  check-docs:
    description: >-
      Whether to fail if source-owned docs have drifted from the lockfile.
      Detects source files added, modified, or deleted without regenerating
      .rrt/docs.lock.toml.
    default: "false"
  check-folder:
    description: >-
      Whether to validate the repository folder structure against
      [tool.rrt.folders] configuration. Fails on missing required files
      or directories.
    default: "false"
  verbose:
    description: "Verbosity level for rrt-hooks output (0=quiet, 1=-v summary, 2=-vv details, 3=-vvv debug). Default: 0."
    required: false
    default: "0"

outputs:
  detected-version:
    description: The current project version detected from the rrt configuration
    value: ${{ steps.detect-version.outputs.detected_version }}
  changelog-status:
    description: Changelog status — one of 'clean', 'dirty', or 'missing'
    value: ${{ steps.detect-version.outputs.changelog_status }}
  health-summary:
    description: JSON object summarising the policy check results
    value: ${{ steps.detect-version.outputs.health_summary }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install repo-release-tools
      shell: bash
      working-directory: ${{ github.action_path }}
      run: python -m pip install .

    - name: Build verbosity flag
      shell: bash
      run: |
        case "${{ inputs.verbose }}" in
          1) echo "_rrt_verbose_flag=-v" >> "$GITHUB_ENV" ;;
          2) echo "_rrt_verbose_flag=-vv" >> "$GITHUB_ENV" ;;
          3) echo "_rrt_verbose_flag=-vvv" >> "$GITHUB_ENV" ;;
          *) echo "_rrt_verbose_flag=" >> "$GITHUB_ENV" ;;
        esac

    - name: Detect project version and changelog status
      id: detect-version
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        detected_version=""
        changelog_status="missing"

        if detected_version=$(rrt ci-version 2>/dev/null); then
          detected_version="${detected_version//[$'\n\r']}"
        fi

        changelog_file="${{ inputs.changelog-file }}"
        if [[ -f "$changelog_file" ]]; then
          if grep -q '^\[Unreleased\]' "$changelog_file" 2>/dev/null; then
            # Count non-empty lines under [Unreleased]
            entries=$(awk '/^\[Unreleased\]/{p=1;next} /^\[/{p=0} p && /^\s*-/{count++} END{print count+0}' "$changelog_file")
            if [[ "$entries" -gt 0 ]]; then
              changelog_status="dirty"
            else
              changelog_status="clean"
            fi
          else
            changelog_status="clean"
          fi
        fi

        health_summary="{\"version\":\"${detected_version}\",\"changelog_status\":\"${changelog_status}\"}"

        echo "detected_version=${detected_version}" >> "$GITHUB_OUTPUT"
        echo "changelog_status=${changelog_status}" >> "$GITHUB_OUTPUT"
        echo "health_summary=${health_summary}" >> "$GITHUB_OUTPUT"

    - name: Validate branch name
      if: inputs.check-branch-name == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_BRANCH_REF_TYPE: ${{ inputs.branch-ref-type }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        ref_type="${INPUT_BRANCH_REF_TYPE:-${GITHUB_REF_TYPE:-}}"
        if [[ "$ref_type" == "tag" ]]; then
          echo "Skipping branch-name validation for tag refs."
          exit 0
        fi
        branch_name="${INPUT_BRANCH_NAME:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
        rrt-hooks ${_rrt_verbose_flag:-} check-branch-name --branch "$branch_name" || \
          (echo "::error::Branch name policy violation: $branch_name" && exit 1)

    - name: Validate commit subject
      if: inputs.check-commit-subject == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMIT_SUBJECT: ${{ inputs.commit-subject }}
      run: |
        set -euo pipefail
        commit_subject="${INPUT_COMMIT_SUBJECT:-$(git log -1 --pretty=%s)}"
        rrt-hooks ${_rrt_verbose_flag:-} check-commit-subject --subject "$commit_subject" || \
          (echo "::error::Commit subject policy violation: $commit_subject" && exit 1)

    - name: Validate changelog update
      if: inputs.check-changelog == 'true' && inputs.changelog-strategy != 'release-only'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMIT_SUBJECT: ${{ inputs.commit-subject }}
        INPUT_CHANGELOG_FILE: ${{ inputs.changelog-file }}
        INPUT_CHANGELOG_STRATEGY: ${{ inputs.changelog-strategy }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        commit_subject="${INPUT_COMMIT_SUBJECT:-$(git log -1 --pretty=%s)}"
        branch_name="${INPUT_BRANCH_NAME:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
        rrt-hooks ${_rrt_verbose_flag:-} check-changelog \
          --subject "$commit_subject" \
          --changelog-file "$INPUT_CHANGELOG_FILE" \
          --strategy "${INPUT_CHANGELOG_STRATEGY:-auto}" \
          --branch "$branch_name" \
          --ref HEAD || \
          (echo "::error::Changelog policy violation — see output above for details." && exit 1)

    - name: Validate clean working tree
      if: inputs.check-dirty-tree == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks ${_rrt_verbose_flag:-} check-dirty-tree || \
          (echo "::error::Working tree is dirty. Commit or stash changes before merging." && exit 1)

    - name: Run rrt doctor health checks
      if: inputs.check-doctor == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks ${_rrt_verbose_flag:-} doctor || \
          (echo "::error::rrt doctor reported automation health issues — see output above." && exit 1)

    - name: Run rrt release health checks
      if: inputs.check-release-health == 'true' || inputs.check-doctor == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt release check || \
          (echo "::error::rrt release check found issues — version targets or changelog may be misconfigured." && exit 1)

    - name: Check runtime EOL status
      if: inputs.check-eol == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks ${_rrt_verbose_flag:-} check-eol || \
          (echo "::warning::Runtime EOL check detected end-of-life or near-EOL dependencies." && exit 1)

    - name: Check docs lockfile consistency
      if: inputs.check-docs == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks ${_rrt_verbose_flag:-} check-docs || \
          (echo "::error::Docs lockfile is out of sync. Run 'rrt docs build' to regenerate." && exit 1)

    - name: Validate folder structure
      if: inputs.check-folder == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks ${_rrt_verbose_flag:-} folder-check || \
          (echo "::error::Folder structure violation — see output above for details." && exit 1)

name: repo-release-tools policy checks
description: Validate branch names, commit subjects, and changelog updates with repo-release-tools
branding:
  icon: 'tag'
  color: 'green'

inputs:
  python-version:
    description: Python version used to run repo-release-tools
    default: "3.12"
  working-directory:
    description: Repository path to install and run repo-release-tools from
    default: "."
  check-branch-name:
    description: Whether to validate the current branch name
    default: "true"
  branch-ref-type:
    description: Explicit ref type override for branch validation; defaults to the workflow ref type
    required: false
  branch-name:
    description: Explicit branch name to validate; defaults to the workflow branch
    required: false
  check-commit-subject:
    description: Whether to validate the commit subject
    default: "true"
  commit-subject:
    description: Explicit commit subject to validate; defaults to the latest commit subject
    required: false
  check-changelog:
    description: Whether to validate changelog updates for changelog-relevant commits
    default: "true"
  changelog-file:
    description: Explicit changelog path to validate
    default: "CHANGELOG.md"
  changelog-strategy:
    description: |
      Changelog enforcement strategy:
        per-commit   – (default) the changelog file must appear in the commit's changed-file list.
        unreleased   – a non-empty [Unreleased] section must exist in the changelog.
        release-only – the check is skipped (changelog is updated only at release time).
    default: "per-commit"
  check-dirty-tree:
    description: Whether to fail when the checked-out work tree is dirty
    default: "false"
  check-doctor:
    description: Whether to run rrt doctor health checks (version targets, pin targets, changelog)
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install repo-release-tools
      shell: bash
      working-directory: ${{ github.action_path }}
      run: python -m pip install .

    - name: Validate branch name
      if: inputs.check-branch-name == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_BRANCH_REF_TYPE: ${{ inputs.branch-ref-type }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        ref_type="${INPUT_BRANCH_REF_TYPE:-${GITHUB_REF_TYPE:-}}"
        if [[ "$ref_type" == "tag" ]]; then
          echo "Skipping branch-name validation for tag refs."
          exit 0
        fi
        branch_name="${INPUT_BRANCH_NAME:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
        rrt-hooks check-branch-name --branch "$branch_name"

    - name: Validate commit subject
      if: inputs.check-commit-subject == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMIT_SUBJECT: ${{ inputs.commit-subject }}
      run: |
        set -euo pipefail
        commit_subject="${INPUT_COMMIT_SUBJECT:-$(git log -1 --pretty=%s)}"
        rrt-hooks check-commit-subject --subject "$commit_subject"

    - name: Validate changelog update
      if: inputs.check-changelog == 'true' && inputs.changelog-strategy != 'release-only'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_COMMIT_SUBJECT: ${{ inputs.commit-subject }}
        INPUT_CHANGELOG_FILE: ${{ inputs.changelog-file }}
        INPUT_CHANGELOG_STRATEGY: ${{ inputs.changelog-strategy }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        commit_subject="${INPUT_COMMIT_SUBJECT:-$(git log -1 --pretty=%s)}"
        branch_name="${INPUT_BRANCH_NAME:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
        rrt-hooks check-changelog \
          --subject "$commit_subject" \
          --changelog-file "$INPUT_CHANGELOG_FILE" \
          --strategy "${INPUT_CHANGELOG_STRATEGY:-per-commit}" \
          --branch "$branch_name" \
          --ref HEAD

    - name: Validate clean working tree
      if: inputs.check-dirty-tree == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks check-dirty-tree

    - name: Run rrt doctor health checks
      if: inputs.check-doctor == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        rrt-hooks doctor

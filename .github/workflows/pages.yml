# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: 📖 Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Verify job: lock-based drift checks before building
  verify:
    name: ✅ Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Check docs lock drift
        run: uv run rrt docs publish --check
      - name: Check docs inject drift
        run: uv run rrt docs inject --check
      - name: Check health regressions
        run: uv run rrt doctor --check --strict
      - name: Check tree structure drift
        run: uv run rrt tree --check --strict --strict-empty-dirs
      - name: Generate badge SVGs for artifact check
        run: uv run python -m repo_release_tools.assets.badges src/repo_release_tools/assets/badges
      - name: Check artifact integrity
        run: uv run rrt artifacts --check --strict

  # Build job
  build:
    name: 🏗️ Build
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Generate docs badge assets
        run: uv run python -m repo_release_tools.assets.badges docs/assets/badges
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  # Deployment job
  deploy:
    name: 🚀 Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

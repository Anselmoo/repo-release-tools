name: 🧬 Hybrid Runtime

on:
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - chore/**
      - docs/**
      - refactor/**
      - test/**
      - ci/**
      - perf/**
      - style/**
      - build/**
      - copilot/**
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hybrid-runtime-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime:
    name: 🧬 Hybrid runtime examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run hybrid runtime pytest suite
        # Explicitly override the coverage fail threshold for the hybrid runtime
        # job because it runs a focused runtime-only test which doesn't exercise
        # the full codebase. Pass a lower fail-under so the workflow doesn't
        # fail due to the global `--cov-fail-under=100` in pyproject.toml.
        run: uv run pytest -q -m runtime tests/integration/test_runtime_hybrid.py --cov-fail-under=0

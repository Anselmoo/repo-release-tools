title: repo-release-tools
description: Minimal product docs for repo-release-tools
# theme: minima # Custom "reto" design enforced via local _layouts

# GitHub Pages project-site routing
url: "https://anselmoo.github.io"
baseurl: "/repo-release-tools"

# Markdown/rendering
markdown: kramdown
highlighter: rouge
permalink: pretty
kramdown:
  input: GFM
  hard_wrap: false

# Standard Jekyll plugins for GitHub Pages
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# Keep generated output clean
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

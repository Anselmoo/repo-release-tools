<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  {% include custom-head.html %}

  {% seo %}
  {% feed_meta %}
</head>
<body class="reto-mode">
  <div class="reto-container">
    <header class="site-header" role="banner">
      <div class="wrapper">
        <div class="header-content">
          <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
            <span class="reto-logo">⬡</span> {{ site.title | escape }}
          </a>
          <nav class="site-nav">
            <input type="checkbox" id="nav-trigger" class="nav-trigger" />
            <label for="nav-trigger">
              <span class="menu-icon">
                <svg viewBox="0 0 18 15" width="18px" height="15px">
                  <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
                </svg>
              </span>
            </label>

            <div class="trigger">
              <a class="page-link" href="{{ '/action/' | relative_url }}">Action</a>
              <a class="page-link" href="{{ '/commands/rrt-cli/' | relative_url }}">CLI</a>
              <a class="page-link" href="{{ '/agent-instructions/' | relative_url }}">Agents</a>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <div class="footer-content">
          <div class="footer-left">
            <span class="reto-status">SYSTEM READY</span>
            <div class="footer-links">
               <a href="https://github.com/Anselmoo/repo-release-tools" class="btn-reto">GitHub</a>
            </div>
          </div>
          <div class="footer-right">
            <p>{{ site.description | escape }}</p>
          </div>
        </div>
      </div>
    </footer>
  </div>
  <div class="reto-scanline"></div>
</body>
</html>

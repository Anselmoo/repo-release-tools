# Generated by 'rrt config reference' — do not edit by hand.

[tool.rrt]

# Path to the changelog file relative to the project root.
changelog_file = "..."

# How changelog entries are written. 'incremental' = append per commit;
# 'squash' = accumulate then promote on release.
# one of: incremental, squash
changelog_workflow = "incremental"

# Additional branch type prefixes beyond the built-in set.
extra_branch_types = []

# Additional conventional commit types recognized by rrt (e.g. ['security',
# 'ux']).
extra_commit_types = []

# Paths to generated files that should be staged after a bump.
generated_files = []

# Command to regenerate lockfiles after a version bump (e.g. ['uv', 'lock',
# '-U']).
lock_command = []

# Behavior when a pin target pattern has no match. Default: 'error'.
# one of: error, warn
pin_target_missing = "error"

# Release branch name template. Use {version} as a placeholder.
release_branch = "..."

# Documentation tree injection configuration.
[tool.rrt.docs]

badge_assets_dir = "..."

# one of: shields, svg, text
badge_style = "shields"

# one of: color, dark, light
badge_variant = "color"

docs_dir = "..."

# one of: both, explicit, implicit
extraction_mode = "both"

formats = []

languages = []

mirror_src_tree = false

source_link_badge = false

source_ref = "..."

source_repo_url = "..."

source_url_template = "..."

src_dir = "..."

# End-of-life lifecycle tracking configuration.
[tool.rrt.eol]

allow_eol = false

error_days = 0

fetch_live = false

languages = []

warn_days = 0

[[tool.rrt.eol.overrides]]

cycle = "..."

eol = "..."

language = "..."

# Map extra commit types to changelog sections (e.g. {security = 'Fixed', ux =
# 'Changed'}).
[tool.rrt.extra_section_map]

# Folder supervision policy configuration.
[tool.rrt.folders]

# one of: off, strict, warn
mode = "off"

rules = []

templates = []

# Additional files kept in sync with the release version (e.g. CI action
# pins).
[[tool.rrt.pin_targets]]

# Path to the file containing the pin, relative to the project root.
path = "..."

# Regex with 3 capture groups: (prefix)(version)(suffix).
pattern = "..."

# Upstream release source for `rrt sync` discovery.
[tool.rrt.upstream]

# Commit message template for 'rrt sync --bump --commit'; {version} is
# substituted.
commit_message = "..."

# Upstream package name (vendor/name for packagist).
package = "..."

# one of: crates, npm, nuget, packagist, pypi
provider = "crates"

# Named release units for monorepo or multi-component projects.
[[tool.rrt.version_groups]]

changelog_file = "..."

# one of: incremental, squash
changelog_workflow = "incremental"

generated_files = []

lock_command = []

name = "..."

# pin_targets: ($ref — see the referenced section for details)

release_branch = "..."

# upstream: ($ref — see the referenced section for details)

# version_targets: ($ref — see the referenced section for details)

# Files whose version strings rrt will update on bump.
[[tool.rrt.version_targets]]

# How the CI version string is formatted. Use 'pep440' for Python packages.
# one of: pep440, semver_pre
ci_format = "pep440"

# Key within 'section' that holds the version string. Must be paired with
# 'section'.
field = "..."

# Well-known target type. Use 'pattern' with a 1-capture-group regex to read
# the version from a dependency pin or arbitrary string. All other kinds are
# mutually exclusive with 'pattern' and 'section'+'field'.
# one of: cargo_toml, csproj, gemspec, go_version, maven_pom, package_json, pattern, pep621, python_version
kind = "cargo_toml"

# Path to the file containing the version string, relative to the project
# root.
path = "..."

# Regex pattern. When used with kind='pattern': exactly 1 capture group whose
# match is the version string. When used alone (no kind): exactly 3 capture
# groups (prefix)(version)(suffix). Mutually exclusive with standalone 'kind'
# and 'section'+'field'.
pattern = "..."

# TOML table section containing the version field (e.g. 'package'). Must be
# paired with 'field'.
section = "..."

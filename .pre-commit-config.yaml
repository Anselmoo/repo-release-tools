default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: rrt-no-raw-print
        name: rrt no raw print
        entry: python scripts/check_no_raw_prints.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: rrt-ruff-check
        name: rrt ruff check
        entry: uv run ruff check --fix --output-format=full src tests
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: rrt-ruff-format
        name: rrt ruff format
        entry: uv run ruff format --check src tests
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: rrt-ty-check
        name: rrt ty check
        entry: uv run ty check src tests
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: rrt-ci-lint-gate
        name: rrt ci lint gate
        entry: uvx pre-commit run --all-files --show-diff-on-failure
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: debug-statements
      - id: check-toml
      - id: check-case-conflict


ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
